name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python Backend ─────────────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Verify imports
        run: |
          uv run python -c "
          from fastapi import FastAPI
          from server import app
          from canvas.client import CanvasClient
          from parser.doc_parser import parse_document
          from llm_client import llm_stream
          from notes.generator import SYSTEM_PROMPT, CHAT_SYSTEM_PROMPT
          print('All imports OK')
          "

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Check dist
        run: |
          test -f dist/index.html && echo "dist OK" || exit 1
          test -f dist/assets/index-*.js  && echo "JS OK"  || exit 1
          test -f dist/assets/index-*.css && echo "CSS OK" || exit 1
